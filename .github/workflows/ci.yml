name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Must match the toolchain in go.mod (bumped to 1.25 by
          # cloud.google.com/go/compute).
          go-version: '1.25'
          cache: true

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      # The GCE integration test is build-tagged "integration" and is NOT
      # selected here, so unit tests run without any cloud credentials.
      - name: Unit tests
        run: go test -race -coverprofile=coverage.txt ./...

      - name: Build static binary
        run: CGO_ENABLED=0 GOOS=linux go build -trimpath -ldflags="-s -w" -o /dev/null ./cmd/docker-volume-gcepd

  package:
    name: validate plugin packaging
    runs-on: ubuntu-latest
    needs: test
    # On tags we skip this validation-only job; the release job below does the
    # real build + push.
    if: startsWith(github.ref, 'refs/tags/v') == false
    steps:
      - uses: actions/checkout@v4

      # Validates the Dockerfile + rootfs assembly + config.json without pushing.
      - name: Build + create managed plugin (amd64)
        run: make plugin-create ARCH=amd64 REGISTRY=local TAG=ci

  release:
    name: build + push managed plugin
    runs-on: ubuntu-latest
    needs: test
    # Only on version tags (v1.2.3). Pushes one managed plugin per architecture
    # under an arch-suffixed tag, since managed plugins are single-arch.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      # arm64 rootfs is assembled by running the arm64 image under QEMU, since
      # the runner is amd64. amd64 needs no emulation but the action is a no-op
      # there.
      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version tag
        id: ver
        # refs/tags/v1.2.3 -> 1.2.3
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build + push versioned tag (${{ matrix.arch }})
        run: |
          make plugin-push \
            ARCH=${{ matrix.arch }} \
            TAG=${{ steps.ver.outputs.tag }} \
            REGISTRY=ghcr.io/${{ github.repository_owner }} \
            PLUGIN_NAME=docker-plugin-gce-pd

      # Re-tag the same rootfs as the floating `latest-<arch>` and push it, so
      # `docker plugin install .../docker-plugin-gce-pd:latest-amd64` always
      # tracks the newest release. The rootfs from build/plugin-<arch> is reused.
      - name: Push latest tag (${{ matrix.arch }})
        run: |
          OWNER=ghcr.io/${{ github.repository_owner }}
          REF=$OWNER/docker-plugin-gce-pd:latest-${{ matrix.arch }}
          docker plugin rm -f "$REF" 2>/dev/null || true
          docker plugin create "$REF" build/plugin-${{ matrix.arch }}
          docker plugin push "$REF"
